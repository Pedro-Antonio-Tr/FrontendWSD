<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold" routerLink="/" style="cursor: pointer;">
      Time Bank
    </a>
    
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto align-items-center">
        
        @if (!isLoggedIn) {
          <li class="nav-item">
            <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/login" routerLinkActive="active">Login</a>
          </li>
          <li class="nav-item ms-lg-2 mt-2 mt-lg-0">
            <a class="btn btn-light text-primary fw-semibold px-3" routerLink="/register">Sign up</a>
          </li>
        }
        @if (isLoggedIn) {
          <li class="nav-item">
            <a class="nav-link" routerLink="/marketplace" routerLinkActive="active">Marketplace</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" routerLink="/profile" routerLinkActive="active">My Profile</a>
          </li>
          
          <!-- NUEVO: Dropdown de la Billetera -->
          <li class="nav-item dropdown ms-lg-2">
            <button class="btn btn-outline-light btn-sm fw-bold border-2 px-3 dropdown-toggle" 
                    id="walletDropdown" data-bs-toggle="dropdown" aria-expanded="false">
              <i class="bi bi-coin me-1"></i> {{ userBalance }} TC
            </button>
            
            <ul class="dropdown-menu dropdown-menu-end shadow border-0 p-3 mt-2" aria-labelledby="walletDropdown" style="min-width: 220px;">
              <li>
                <h6 class="dropdown-header px-0 text-dark fw-bold mb-3 border-bottom pb-2">
                  <i class="bi bi-wallet2 text-primary me-2"></i>Recharge Wallet
                </h6>
              </li>
              <li>
                <div class="d-flex flex-column gap-2">
                  <button class="btn btn-outline-primary btn-sm rounded-pill fw-bold" 
                          (click)="rechargeBalance(10)" [disabled]="isRecharging">
                    +10 TC
                  </button>
                  <button class="btn btn-outline-success btn-sm rounded-pill fw-bold" 
                          (click)="rechargeBalance(50)" [disabled]="isRecharging">
                    +50 TC
                  </button>
                  <button class="btn btn-primary btn-sm rounded-pill fw-bold shadow-sm" 
                          (click)="rechargeBalance(100)" [disabled]="isRecharging">
                    <i class="bi bi-star-fill text-warning me-1"></i> +100 TC
                  </button>
                </div>
              </li>
              @if (isRecharging) {
                <li class="mt-3 text-center">
                  <div class="text-primary small fw-semibold">
                    <span class="spinner-border spinner-border-sm me-1"></span> Redirecting...
                  </div>
                </li>
              }
            </ul>
          </li>

          @if (isAdmin) {
            <li class="nav-item">
              <a class="nav-link" routerLink="/admin" routerLinkActive="active">Admin Panel</a>
            </li>
          }
          <li class="nav-item ms-lg-3 mt-2 mt-lg-0">
            <button class="btn btn-danger btn-sm px-3 shadow-sm" (click)="logout()">Log Out</button>
          </li>
        }
        
      </ul>
    </div>
  </div>
</nav>
