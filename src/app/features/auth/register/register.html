<div class="row justify-content-center mt-5">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h2 class="card-title text-center mb-4">Crea tu Cuenta</h2>
        
        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
          
          <div class="mb-3">
            <label for="name" class="form-label">Nombre Completo</label>
            <input type="text" id="name" class="form-control" formControlName="name"
                   [class.is-invalid]="registerForm.get('name')?.invalid && registerForm.get('name')?.touched">
            <div class="invalid-feedback">El nombre es obligatorio (mínimo 3 caracteres).</div>
          </div>

          <div class="mb-3">
            <label for="email" class="form-label">Correo Electrónico</label>
            <input type="email" id="email" class="form-control" formControlName="email"
                   [class.is-invalid]="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
            <div class="invalid-feedback">Introduce un correo válido.</div>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="password" class="form-label">Contraseña</label>
              <input type="password" id="password" class="form-control" formControlName="password"
                     [class.is-invalid]="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
              <div class="invalid-feedback">Mínimo 6 caracteres.</div>
            </div>
            
            <div class="col-md-6 mb-4">
              <label for="confirmPassword" class="form-label">Repetir Contraseña</label>
              <input type="password" id="confirmPassword" class="form-control" formControlName="confirmPassword"
                     [class.is-invalid]="registerForm.get('confirmPassword')?.invalid && registerForm.get('confirmPassword')?.touched">
              <div class="invalid-feedback">Obligatorio.</div>
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100">Registrarse</button>
        </form>
        
        <div class="text-center mt-3">
          <p>¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a></p>
        </div>
        
      </div>
    </div>
  </div>
</div>
