<div class="row justify-content-center mt-5">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h2 class="card-title text-center mb-4">Create your account</h2>
        
        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
          
          <div class="mb-3">
            <label for="name" class="form-label">Full Name</label>
            <input type="text" id="name" class="form-control" formControlName="name"
                   [class.is-invalid]="registerForm.get('name')?.invalid && registerForm.get('name')?.touched">
            <div class="invalid-feedback">A name is required (minimum 3 characters).</div>
          </div>

          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" id="email" class="form-control" formControlName="email"
                   [class.is-invalid]="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
            <div class="invalid-feedback">Please enter a valid email address.</div>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="password" class="form-label">Password</label>
              <input type="password" id="password" class="form-control" formControlName="password"
                     [class.is-invalid]="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
              <div class="invalid-feedback">At least 6 characters.</div>
            </div>
            
            <div class="col-md-6 mb-4">
              <label for="confirmPassword" class="form-label">Repeat password</label>
              <input type="password" id="confirmPassword" class="form-control" formControlName="confirmPassword"
                     [class.is-invalid]="registerForm.get('confirmPassword')?.invalid && registerForm.get('confirmPassword')?.touched">
              <div class="invalid-feedback">Mandatory.</div>
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100">Sign Up</button>
        </form>
        
        <div class="text-center mt-3">
          <p>Do you already have an account? <a routerLink="/login">Log In</a></p>
        </div>
        
      </div>
    </div>
  </div>
</div>
